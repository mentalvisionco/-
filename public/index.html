<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="منصة تدريب وإدارة تعلم - سجل دخولك لمتابعة المحاضرات والمهام">
  <title>Tadreeb — تسجيل الدخول</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <div class="auth-wrapper">
    <div class="auth-card" id="loginCard">
      <div class="auth-header">
        <h1>مرحبًا بعودتك</h1>
        <p>سجّل دخولك لمتابعة رحلتك التدريبية</p>
      </div>
      <form id="loginForm">
        <div class="form-group">
          <label>البريد الإلكتروني</label>
          <input type="email" id="loginEmail" class="form-control" required placeholder="name@example.com">
        </div>
        <div class="form-group">
          <label>كلمة المرور</label>
          <input type="password" id="loginPassword" class="form-control" required placeholder="••••••••">
        </div>
        <button type="submit" class="btn">تسجيل الدخول</button>
      </form>
      <div class="auth-switch">
        ليس لديك حساب؟ <a href="#" id="showRegister">أنشئ واحدًا</a>
      </div>
    </div>

    <div class="auth-card hidden" id="registerCard">
      <div class="auth-header">
        <h1>إنشاء حساب</h1>
        <p>انضم إلى المنصة وابدأ التعلّم</p>
      </div>
      <form id="registerForm">
        <div class="form-group">
          <label>الاسم الكامل</label>
          <input type="text" id="regName" class="form-control" required placeholder="اسمك الكامل">
        </div>
        <div class="form-group">
          <label>البريد الإلكتروني</label>
          <input type="email" id="regEmail" class="form-control" required placeholder="name@example.com">
        </div>
        <div class="form-group">
          <label>كلمة المرور</label>
          <input type="password" id="regPassword" class="form-control" required minlength="3" placeholder="3 أحرف على الأقل">
        </div>
        <input type="hidden" id="regRole" value="student">
        <button type="submit" class="btn">إنشاء الحساب</button>
      </form>
      <div class="auth-switch">
        لديك حساب بالفعل؟ <a href="#" id="showLogin">سجّل الدخول</a>
      </div>
    </div>
  </div>

  <div id="toast" class="toast">رسالة النظام</div>

  <script src="js/db.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
